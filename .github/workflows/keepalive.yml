name: Keep Alive

on:
  schedule:
    - cron: '*/14 * * * *'  # a cada 14 minutos

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          curl -s "${{ secrets.RENDER_API_URL }}/health" \
            --max-time 30 \
            --retry 2 \
            -o /dev/null \
            -w "Status: %{http_code}"
